media:
  - name: images
    label: Images and logos
    input: uploads/images
    output: /uploads/images
    rename: safe
    categories: [image]
  - name: documents
    label: PDFs and downloadable files
    input: uploads/documents
    output: /uploads/documents
    rename: safe
    categories: [document]

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "cms: add {path}"
      update: "cms: update {path}"
      delete: "cms: remove {path}"

components:
  simple_hero:
    type: object
    fields:
      - { name: title, label: Page heading, type: string, required: true }
      - { name: description, label: Page introduction, type: text, required: true }
      - { name: image, label: Background image, type: image, options: { media: images } }

  image_hero:
    type: object
    fields:
      - { name: title, label: Page heading, type: string, required: true }
      - { name: description, label: Page introduction, type: text, required: true }
      - { name: image, label: Hero image, type: image, options: { media: images } }

  heading:
    type: object
    fields:
      - { name: label, label: Small section label, type: string }
      - { name: title, label: Section heading, type: string, required: true }
      - { name: description, label: Section introduction, type: text }

  callout:
    type: object
    fields:
      - { name: label, label: Small label above heading, type: string }
      - { name: title, label: Heading, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: button_label, label: Button text, type: string }
      - { name: button_link, label: Button link, type: string, description: "Example: contact.html or contact.html?type=equipment" }

  advantage:
    type: object
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text }

  specialty:
    type: object
    fields:
      - { name: id, label: Anchor ID, type: string, required: true, description: "Keep lowercase. Only change this with technical help because links may depend on it." }
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: image, label: Card image, type: image, options: { media: images } }
      - { name: link, label: Card link, type: string, description: "Example: products.html#manufacturing" }
      - { name: button_label, label: Link text, type: string }

  industry:
    type: object
    fields:
      - { name: title, label: Industry title, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: featured, label: Large featured card, type: boolean }
      - { name: tags, label: Departments / tags, type: string, list: true }

  icon_card:
    type: object
    fields:
      - { name: icon, label: Icon or emoji, type: string }
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text }

  metric:
    type: object
    fields:
      - { name: value, label: Number value, type: number, required: true }
      - { name: display_value, label: Custom display text, type: string, description: "Optional. Example: Single instead of 1." }
      - { name: prefix, label: Prefix, type: string, description: "Example: <" }
      - { name: suffix, label: Suffix, type: string, description: "Example: + or hr" }
      - { name: tagline, label: Small green line, type: string }
      - { name: label, label: Description, type: string, required: true }

  facility_block:
    type: object
    fields:
      - { name: type_label, label: Type label, type: string, description: "Example: Manufacturing Facility or Office" }
      - { name: title, label: Heading, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: address_lines, label: Address lines, type: string, list: true }

  client:
    type: object
    fields:
      - { name: short_name, label: Placeholder letters, type: string, required: true, description: "Shown only when no logo is uploaded." }
      - { name: name, label: Customer name, type: string, required: true }
      - { name: tagline, label: Relationship note, type: string }
      - { name: logo, label: Customer logo, type: image, options: { media: images } }
      - { name: website_url, label: Website URL, type: string, description: "Optional. Link to client's website (makes client name clickable)." }

  testimonial:
    type: object
    fields:
      - { name: quote, label: Approved quotation, type: text, required: true }
      - { name: author, label: Person's name, type: string, required: true }
      - { name: role, label: Role and institution, type: string }
      - { name: published, label: Show on website, type: boolean }

  certification:
    type: object
    fields:
      - { name: icon, label: Short badge letters, type: string, required: true, description: "Shown only when no logo is uploaded." }
      - { name: logo, label: Certification logo, type: image, options: { media: images }, description: "Optional. Upload logo image instead of letters." }
      - { name: name, label: Certification name, type: string, required: true }
      - { name: details, label: Public certificate note, type: text }
      - { name: file, label: Certificate PDF, type: file, options: { media: documents } }
      - { name: link, label: Card hyperlink URL, type: string, description: "Optional. Link to a document or website if not uploading a PDF." }

  link:
    type: object
    fields:
      - { name: label, label: Link text, type: string, required: true }
      - { name: href, label: Link URL, type: string, required: true }

  nav_item:
    type: object
    fields:
      - { name: label, label: Navigation label, type: string, required: true }
      - { name: href, label: Link URL, type: string, required: true }
      - { name: route, label: Page route key, type: string, description: "Example: home, products, contact" }

  footer_column:
    type: object
    fields:
      - { name: title, label: Column heading, type: string, required: true }
      - { name: links, label: Links, component: link, list: true }

  seo_entry:
    type: object
    fields:
      - { name: title, label: SEO title, type: string, required: true }
      - { name: description, label: Meta description, type: text, required: true }
      - { name: image, label: Social preview image URL, type: string }

  select_option:
    type: object
    fields:
      - { name: label, label: Visitor label, type: string, required: true }
      - { name: value, label: Submitted value, type: string }

  address_block:
    type: object
    fields:
      - { name: label, label: Small label, type: string }
      - { name: title, label: Heading, type: string }
      - { name: address_lines, label: Address lines, type: string, list: true }

  contact_channel:
    type: object
    fields:
      - { name: icon, label: Icon or emoji, type: string }
      - { name: title, label: Channel title, type: string, required: true }
      - { name: label, label: Shown contact detail, type: string, required: true }
      - { name: href, label: Click link, type: string, required: true, description: "Example: tel:+919820033597 or mailto:sales@peic.in" }

  resource_filter:
    type: object
    fields:
      - { name: label, label: Filter label, type: string, required: true }
      - { name: value, label: Category value, type: string, required: true, description: "Use all, brochure, certificate, manual, or reference." }

  legal_section:
    type: object
    fields:
      - { name: title, label: Section heading, type: string, required: true }
      - { name: body, label: Body text, type: text, required: true }

content:
  - name: home_page
    label: "1. Home page"
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero section
        type: object
        fields:
          - { name: eyebrow, label: Small heading, type: string }
          - { name: title, label: Main heading, type: string, required: true }
          - { name: description, label: Introduction, type: text, required: true }
          - { name: image, label: Background image, type: image, options: { media: images } }
          - { name: primary_button_label, label: Primary button text, type: string }
          - { name: primary_button_link, label: Primary button link, type: string, description: "Example: contact.html?type=equipment" }
          - { name: secondary_button_label, label: Secondary button text, type: string }
          - { name: secondary_button_link, label: Secondary button link, type: string, description: "Example: about.html" }
      - { name: trust_banner, label: Trust banner items, type: string, list: true }
      - name: hero_panel
        label: Hero proof panel
        type: object
        fields:
          - { name: kicker, label: Small label, type: string }
          - { name: metric, label: Large metric, type: string }
          - { name: title, label: Heading, type: string }
          - { name: description, label: Supporting text, type: text }
          - name: specs
            label: Small specification cells
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
      - name: capabilities
        label: Core capabilities
        type: object
        fields:
          - { name: label, label: Small section label, type: string }
          - { name: title, label: Section heading, type: string }
          - { name: description, label: Section introduction, type: text }
          - name: cards
            label: Capability cards
            type: object
            list: true
            fields:
              - { name: title, label: Card title, type: string, required: true }
              - { name: description, label: Card description, type: text }
              - { name: image, label: Card image, type: image, options: { media: images } }
              - { name: link, label: Card link, type: string, description: "Example: products.html#partners" }
              - { name: advantages, label: Tick-list items, type: string, list: true }
              - { name: button_label, label: Link text, type: string }
      - name: workflow
        label: Homepage workflow
        type: object
        fields:
          - { name: label, label: Small section label, type: string }
          - { name: title, label: Section heading, type: string }
          - { name: description, label: Section introduction, type: text }
          - name: steps
            label: Workflow steps
            component: advantage
            list: true
      - { name: stats, label: Homepage proof statistics, component: metric, list: true }
      - { name: advantage, label: Procurement advantage heading, component: heading }
      - { name: clients, label: Client section heading, component: heading }
      - { name: clients_list, label: Homepage client logos, component: client, list: true }
      - { name: cta, label: Bottom call to action, component: callout }

  - name: products_page
    label: "2. Products page"
    type: file
    path: content/products-page.json
    format: json
    fields:
      - { name: hero, label: Hero section, component: simple_hero }
      - name: manufacturing
        label: Manufacturing section
        type: object
        fields:
          - { name: badge, label: Small tier label, type: string, description: "Example: Tier 1 · Core Competency" }
          - { name: title, label: Heading, type: string }
          - { name: description, label: Introduction, type: text }
          - { name: advantages_title, label: Advantages heading, type: string }
          - { name: advantages_subtitle, label: Advantages introduction, type: text }
          - { name: advantages, label: Advantages, component: advantage, list: true }
      - name: partners
        label: Partner technologies section
        type: object
        fields:
          - { name: badge, label: Small tier label, type: string, description: "Example: Tier 2 · Partner Technologies" }
          - { name: title, label: Heading, type: string }
          - { name: description, label: Introduction, type: text }
          - { name: advantages_title, label: Advantages heading, type: string }
          - { name: advantages_subtitle, label: Advantages introduction, type: text }
          - { name: advantages, label: Advantages, component: advantage, list: true }
          - { name: global_title, label: Global partners heading, type: string }
          - { name: domestic_title, label: Domestic partners heading, type: string }
      - name: manufactured_products
        label: Manufactured products
        type: object
        list: true
        fields:
          - { name: name, label: Product name, type: string, required: true }
          - { name: slug, label: Product page slug, type: string, required: true, description: "Must match the HTML page route, without .html. Example: horizontal-rectangular-sterilizer" }
          - { name: detail_url, label: Product detail page URL, type: string, required: true, description: "Example: horizontal-rectangular-sterilizer.html" }
          - { name: certification, label: Certification / status line, type: string }
          - { name: description, label: Description, type: text, required: true }
          - { name: image, label: Product image, type: image, options: { media: images } }
          - { name: specification_file, label: Specification PDF, type: file, options: { media: documents } }
          - name: access_mode
            label: Visitor action
            type: select
            required: true
            default: enquiry_only
            options:
              values:
                - { value: enquiry_only, label: Enquiry only }
                - { value: gated_download, label: Form required, then download PDF }
                - { value: public_download, label: Public PDF, no form required }
          - { name: action_label, label: Button wording, type: string, description: "Example: Request Specifications or Download Brochure" }
          - { name: detail_label, label: Detail link wording, type: string, description: "Optional. Example: See details" }
      - name: manufactured_range
        label: Additional manufactured range callout
        type: object
        fields:
          - { name: label, label: Small label, type: string }
          - { name: title, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: items, label: Range items, type: string, list: true }
      - name: hospital_scope
        label: Hospital-wide equipment scope callout
        type: object
        fields:
          - { name: label, label: Small label, type: string }
          - { name: title, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: items, label: Scope tags, type: string, list: true }
      - name: partner_companies
        label: Partner companies
        type: object
        list: true
        fields:
          - { name: name, label: Partner name, type: string, required: true }
          - name: group
            label: Partner group
            type: select
            required: true
            options:
              values:
                - { value: global, label: Global partner }
                - { value: domestic, label: Domestic partner }
          - { name: country, label: Country, type: string }
          - { name: flag, label: Flag emoji, type: string }
          - { name: description, label: Description, type: text }
          - { name: categories, label: Product categories, type: string, list: true }
          - { name: solutions_url, label: Internal solutions link, type: string, description: "Example: solutions.html#oncology" }
          - { name: website_url, label: Official website URL, type: string, description: "Leave blank if only the internal solutions page should open." }
          - { name: logo, label: Partner logo, type: image, options: { media: images } }
      - { name: cta, label: Bottom call to action, component: callout }

  - name: solutions_page
    label: "3. Solutions page"
    type: file
    path: content/solutions-page.json
    format: json
    fields:
      - { name: hero, label: Hero section, component: simple_hero }
      - { name: specialties_heading, label: Medical specialties heading, component: heading }
      - { name: specialties, label: Medical specialty cards, component: specialty, list: true }
      - { name: industries_heading, label: Industries heading, component: heading }
      - { name: industries, label: Industries and clients, component: industry, list: true }
      - { name: cta, label: Bottom call to action, component: callout }

  - name: about_page
    label: "4. About page"
    type: file
    path: content/about.json
    format: json
    fields:
      - name: page
        label: Page headings and copy
        type: object
        fields:
          - { name: hero, label: Hero section, component: simple_hero }
          - name: legacy
            label: Legacy section
            type: object
            fields:
              - { name: label, label: Small section label, type: string }
              - { name: title, label: Section heading, type: string }
              - { name: image, label: Legacy image, type: image, options: { media: images } }
              - { name: image_alt, label: Legacy image alt text, type: string }
              - { name: paragraphs, label: Paragraphs, type: text, list: true }
          - { name: metrics_heading, label: Metrics heading, component: heading }
          - { name: facilities_heading, label: Facilities heading, component: heading }
          - { name: clients_heading, label: Clients heading, component: heading }
          - { name: testimonials_heading, label: Testimonials heading, component: heading }
          - { name: certifications_heading, label: Certifications heading, component: heading }
          - { name: cta, label: Bottom call to action, component: callout }
      - { name: metrics, label: Company statistics, component: metric, list: true }
      - name: facilities
        label: Facilities and offices
        type: object
        fields:
          - { name: research, label: In-house testing and R&D block, component: facility_block }
          - { name: manufacturing, label: Manufacturing facilities, component: facility_block, list: true }
          - { name: offices, label: Offices, component: facility_block, list: true }
      - { name: clients, label: Customers, component: client, list: true }
      - { name: testimonials, label: Testimonials, component: testimonial, list: true }
      - { name: certifications, label: Certifications, component: certification, list: true }

  - name: service_page
    label: "5. Service page"
    type: file
    path: content/service-page.json
    format: json
    fields:
      - { name: hero, label: Hero section, component: simple_hero }
      - { name: process_heading, label: Service workflow heading, component: heading }
      - { name: process, label: Response process steps, component: advantage, list: true }
      - { name: offerings, label: Service offerings, component: icon_card, list: true }
      - { name: custom_cta, label: Custom solution callout, component: callout }
      - { name: urgent_cta, label: Urgent service callout, component: callout }

  - name: resources_page
    label: "6. Resources page"
    type: file
    path: content/resources-page.json
    format: json
    fields:
      - { name: hero, label: Hero section, component: simple_hero }
      - { name: search_placeholder, label: Search placeholder, type: string }
      - name: empty_state
        label: Empty search state
        type: object
        fields:
          - { name: text, label: Empty state text, type: string }
          - { name: link_label, label: Link label, type: string }
          - { name: link, label: Link URL, type: string }
      - { name: filters, label: Filter tabs, component: resource_filter, list: true }
      - { name: help_cta, label: Documentation help callout, component: callout }
      - name: resources
        label: Downloads and resources
        type: object
        list: true
        fields:
          - { name: title, label: Public title, type: string, required: true }
          - name: category
            label: Category
            type: select
            required: true
            options:
              values:
                - { value: brochure, label: Brochure }
                - { value: certificate, label: Certificate }
                - { value: manual, label: User manual }
                - { value: reference, label: Reference }
          - { name: type_label, label: Label shown on card, type: string, required: true }
          - { name: file, label: PDF / document, type: file, options: { media: documents } }
          - { name: action_label, label: Card call-to-action, type: string, description: "Example: Request Document or Request Certificate" }

  - name: careers_page
    label: "7. Careers page"
    type: file
    path: content/careers-page.json
    format: json
    fields:
      - { name: hero, label: Hero section, component: simple_hero }
      - { name: benefits, label: Employment benefits, component: icon_card, list: true }
      - name: culture
        label: Culture
        type: object
        fields:
          - { name: title, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
          - { name: values, label: Values line, type: string }
      - { name: jobs_heading, label: Open positions heading, component: heading }
      - { name: apply_label, label: Apply link label, type: string }
      - { name: open_application, label: General application callout, component: callout }
      - { name: general_email_note, label: Extra careers note, type: text, description: "Example: Or email your resume directly to careers@peic.in" }
      - { name: general_email_label, label: Email text inside careers note, type: string }
      - { name: general_email_link, label: Careers note email link, type: string, description: "Example: mailto:careers@peic.in" }
      - name: jobs
        label: Job vacancies
        type: object
        list: true
        fields:
          - { name: title, label: Job title, type: string, required: true }
          - { name: category, label: Department / category, type: string, required: true }
          - { name: location, label: Location, type: string, required: true }
          - { name: employment_type, label: Employment type, type: string }
          - { name: open, label: Show as open vacancy, type: boolean }

  - name: contact_page
    label: "8. Contact page"
    type: file
    path: content/contact-page.json
    format: json
    fields:
      - name: hero
        label: Contact hero
        type: object
        fields:
          - { name: label, label: Small section label, type: string }
          - { name: title, label: Main heading, type: string, required: true }
          - { name: description, label: Introduction, type: text }
      - { name: teams_title, label: Teams heading, type: string }
      - { name: contact_channels, label: Contact channels, component: contact_channel, list: true }
      - { name: office_title, label: Office heading, type: string }
      - { name: offices, label: Office addresses, component: address_block, list: true }
      - { name: form_title, label: Form heading, type: string }
      - { name: form_description, label: Form introduction, type: text }
      - { name: submit_label, label: Submit button label, type: string }
      - { name: sending_label, label: Sending button label, type: string }
      - { name: sending_status, label: Sending status message, type: text }
      - { name: success_message, label: Success message, type: text }
      - { name: error_message, label: Error message, type: text }
      - name: fields
        label: Form labels and placeholders
        type: object
        fields:
          - { name: name_label, label: Name label, type: string }
          - { name: name_placeholder, label: Name placeholder, type: string }
          - { name: email_label, label: Email label, type: string }
          - { name: email_placeholder, label: Email placeholder, type: string }
          - { name: phone_label, label: Phone label, type: string }
          - { name: phone_placeholder, label: Phone placeholder, type: string }
          - { name: organization_label, label: Organization label, type: string }
          - { name: organization_optional, label: Organization optional text, type: string }
          - { name: organization_placeholder, label: Organization placeholder, type: string }
          - { name: designation_label, label: Designation label, type: string }
          - { name: designation_optional, label: Designation optional text, type: string }
          - { name: designation_placeholder, label: Designation placeholder, type: string }
          - { name: department_label, label: Department label, type: string }
          - { name: department_optional, label: Department optional text, type: string }
          - { name: department_placeholder, label: Department placeholder, type: string }
          - { name: city_label, label: City label, type: string }
          - { name: city_placeholder, label: City placeholder, type: string }
          - { name: timeline_label, label: Timeline label, type: string }
          - { name: inquiry_type_label, label: Inquiry type label, type: string }
          - { name: quantity_label, label: Quantity label, type: string }
          - { name: quantity_optional, label: Quantity optional text, type: string }
          - { name: quantity_placeholder, label: Quantity placeholder, type: string }
          - { name: tender_label, label: Tender label, type: string }
          - { name: tender_optional, label: Tender optional text, type: string }
          - { name: message_label, label: Message label, type: string }
          - { name: message_placeholder, label: Message placeholder, type: text }
          - { name: consent_text, label: Consent text, type: text }
          - { name: privacy_label, label: Privacy link label, type: string }
          - { name: privacy_link, label: Privacy link URL, type: string }
      - { name: timeline_options, label: Timeline dropdown options, component: select_option, list: true }
      - { name: inquiry_type_options, label: Inquiry type options, component: select_option, list: true }
      - { name: tender_options, label: Tender dropdown options, component: select_option, list: true }

  - name: site_settings
    label: "9. Site-wide company details"
    type: file
    path: content/site.json
    format: json
    fields:
      - { name: company_name, label: Company name, type: string, required: true }
      - { name: logo, label: Logo PNG/Image, type: image, options: { media: images } }
      - { name: short_name, label: Short logo text, type: string }
      - { name: tagline, label: Header tagline, type: string }
      - { name: phone_display, label: Phone shown to visitors, type: string, required: true }
      - { name: phone_link, label: Phone dialing format, type: string, description: "Example: +919820033597" }
      - { name: hotline_label, label: Header phone label, type: string }
      - { name: general_email, label: General email, type: string }
      - { name: sales_email, label: Sales email, type: string }
      - { name: service_email, label: Service email, type: string }
      - { name: careers_email, label: Careers email, type: string }
      - { name: enquiry_email, label: Enquiry notification email, type: string, readonly: true }
      - { name: site_url, label: Website base URL, type: string, description: "Example: https://peic.in" }
      - name: navigation
        label: Navigation
        type: object
        fields:
          - { name: items, label: Main navigation links, component: nav_item, list: true }
          - { name: cta, label: Contact CTA link, component: nav_item }
          - { name: mobile_label, label: Mobile menu label, type: string }
          - { name: drawer_label, label: Mobile drawer accessibility label, type: string }
